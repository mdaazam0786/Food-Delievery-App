spring.application.name=delivery-service
server.port=8090

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.hostname=${DELIVERY_SERVICE_HOST:food-delievery-app-delivery-service.onrender.com}
eureka.instance.secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# ── MySQL — source of truth for driver profiles (slow-moving data) ────────────
spring.datasource.url=jdbc:mysql://thomas.proxy.rlwy.net:27174/foodzie
spring.datasource.username=root
spring.datasource.password=yhWvanlmaBlHndJzHPoIsCOPHpfeMpqI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Redis — real-time geospatial cache (fast-moving location data) ────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# JWT — shared HMAC-SHA256 secret
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# Kafka
spring.kafka.bootstrap-servers=${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}
spring.kafka.security.protocol=SASL_PLAINTEXT
spring.kafka.sasl.mechanism=PLAIN
spring.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="IDFLF22yXTBRd4x9b84_FlN4d-OKtuhu";
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=delivery-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

app.kafka.topics.order-events=order-events
app.kafka.topics.delivery-events=delivery-events

# ── Driver location settings ──────────────────────────────────────────────────
# Redis geo set key prefix — partitioned by city/zone
app.driver.geo-key-prefix=drivers:active
# Heartbeat TTL in seconds — driver is considered offline if no ping within this window
app.driver.heartbeat-ttl-seconds=15
# Ghost driver cleanup interval in milliseconds (runs every 10 seconds)
app.driver.cleanup-interval-ms=10000
# Default nearby search radius in km
app.driver.default-search-radius-km=5.0

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

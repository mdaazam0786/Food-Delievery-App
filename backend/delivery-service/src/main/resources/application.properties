spring.application.name=delivery-service
server.port=8090

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── MySQL — source of truth for driver profiles (slow-moving data) ────────────
spring.datasource.url=jdbc:mysql://localhost:3306/foodzie
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Redis — real-time geospatial cache (fast-moving location data) ────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT — shared HMAC-SHA256 secret
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=delivery-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

app.kafka.topics.order-events=order-events
app.kafka.topics.delivery-events=delivery-events

# ── Driver location settings ──────────────────────────────────────────────────
# Redis geo set key prefix — partitioned by city/zone
app.driver.geo-key-prefix=drivers:active
# Heartbeat TTL in seconds — driver is considered offline if no ping within this window
app.driver.heartbeat-ttl-seconds=15
# Ghost driver cleanup interval in milliseconds (runs every 10 seconds)
app.driver.cleanup-interval-ms=10000
# Default nearby search radius in km
app.driver.default-search-radius-km=5.0

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

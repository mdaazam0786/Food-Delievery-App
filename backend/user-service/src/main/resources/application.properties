spring.application.name=user-service
server.port=8081

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/foodzie
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT decoded locally via shared HMAC secret — see SecurityConfig#jwtDecoder()
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest

app.kafka.topics.user-registered=user.registered

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dryku5yoq}
cloudinary.api-key=${CLOUDINARY_API_KEY:397213128872371}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:4GJqrpFfH5lBAJBxGQqdkddIXf8}

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

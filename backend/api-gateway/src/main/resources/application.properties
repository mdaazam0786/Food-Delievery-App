spring.application.name=api-gateway
server.port=8080

# Exclude Redis autoconfiguration (API Gateway doesn't use Redis)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Forward X-Forwarded-* headers so auth-service resolves OAuth redirect URIs correctly
spring.cloud.gateway.server.webflux.forwarded.enabled=true

# Remove duplicate CORS headers that downstream services may also add
spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.prefer-ip-address=true

# [0] Auth Service - OAuth2 social login (browser redirect flow, no JWT required)
spring.cloud.gateway.server.webflux.routes[0].id=auth-service-oauth2
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/oauth2/**,/login/oauth2/**

# [1] Auth Service - Public endpoints (no auth required)
spring.cloud.gateway.server.webflux.routes[1].id=auth-service-public
spring.cloud.gateway.server.webflux.routes[1].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/mfa/verify,/api/v1/auth/refresh,/api/v1/auth/password-reset,/api/v1/auth/password-reset/confirm

# [2] Auth Service - Protected endpoints (auth required)
spring.cloud.gateway.server.webflux.routes[2].id=auth-service-protected
spring.cloud.gateway.server.webflux.routes[2].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=AuthenticationFilter

# [3] User Service - Users endpoints
spring.cloud.gateway.server.webflux.routes[3].id=user-service-users
spring.cloud.gateway.server.webflux.routes[3].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=AuthenticationFilter

# [4] User Service - Address endpoints
spring.cloud.gateway.server.webflux.routes[4].id=user-service-address
spring.cloud.gateway.server.webflux.routes[4].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/address/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=AuthenticationFilter

# [5] Order Service
spring.cloud.gateway.server.webflux.routes[5].id=order-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=AuthenticationFilter

# [6] Payment Service - webhook is public (Razorpay calls it directly)
spring.cloud.gateway.server.webflux.routes[6].id=payment-service-webhook
spring.cloud.gateway.server.webflux.routes[6].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/payments/webhook

# [7] Payment Service - protected
spring.cloud.gateway.server.webflux.routes[7].id=payment-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.server.webflux.routes[7].filters[0]=AuthenticationFilter

# [8] Cart Service
spring.cloud.gateway.server.webflux.routes[8].id=cart-service
spring.cloud.gateway.server.webflux.routes[8].uri=lb://cart-service
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/cart/**
spring.cloud.gateway.server.webflux.routes[8].filters[0]=AuthenticationFilter

# [9] Restaurant Service - Geocoding (public, no auth required)
spring.cloud.gateway.server.webflux.routes[9].id=restaurant-service-geocode
spring.cloud.gateway.server.webflux.routes[9].uri=lb://restaurant-service
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/geocode

# [10] Restaurant Service - public catalog (no auth required)
spring.cloud.gateway.server.webflux.routes[10].id=restaurant-service-public
spring.cloud.gateway.server.webflux.routes[10].uri=lb://restaurant-service
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/api/restaurants/**

# [11] Restaurant Service - management (owner/admin only)
spring.cloud.gateway.server.webflux.routes[11].id=restaurant-service-admin
spring.cloud.gateway.server.webflux.routes[11].uri=lb://restaurant-service
spring.cloud.gateway.server.webflux.routes[11].predicates[0]=Path=/api/admin/restaurants/**,/api/admin/menu-items/**,/api/admin/media/**,/api/admin/analytics/**
spring.cloud.gateway.server.webflux.routes[11].filters[0]=AuthenticationFilter

# [12] Restaurant Acceptance Service - SSE stream (tablet keeps this open)
spring.cloud.gateway.server.webflux.routes[12].id=restaurant-acceptance-stream
spring.cloud.gateway.server.webflux.routes[12].uri=lb://restaurant-acceptance-service
spring.cloud.gateway.server.webflux.routes[12].predicates[0]=Path=/api/restaurants/*/orders/stream
spring.cloud.gateway.server.webflux.routes[12].filters[0]=AuthenticationFilter

# [13] Restaurant Acceptance Service - accept / decline actions
spring.cloud.gateway.server.webflux.routes[13].id=restaurant-acceptance-actions
spring.cloud.gateway.server.webflux.routes[13].uri=lb://restaurant-acceptance-service
spring.cloud.gateway.server.webflux.routes[13].predicates[0]=Path=/api/restaurants/orders/**
spring.cloud.gateway.server.webflux.routes[13].filters[0]=AuthenticationFilter

# [14] Search Service - public (no auth required)
spring.cloud.gateway.server.webflux.routes[14].id=search-service
spring.cloud.gateway.server.webflux.routes[14].uri=lb://search-service
spring.cloud.gateway.server.webflux.routes[14].predicates[0]=Path=/api/search,/api/search/**

# [15] Delivery Service - driver management and location tracking
spring.cloud.gateway.server.webflux.routes[15].id=delivery-service
spring.cloud.gateway.server.webflux.routes[15].uri=lb://delivery-service
spring.cloud.gateway.server.webflux.routes[15].predicates[0]=Path=/api/drivers/**
spring.cloud.gateway.server.webflux.routes[15].filters[0]=AuthenticationFilter

# [16] Delivery Acceptance Service - SSE stream (driver app keeps this open)
spring.cloud.gateway.server.webflux.routes[16].id=delivery-acceptance-stream
spring.cloud.gateway.server.webflux.routes[16].uri=lb://delivery-acceptance-service
spring.cloud.gateway.server.webflux.routes[16].predicates[0]=Path=/api/delivery/drivers/*/offers/stream
spring.cloud.gateway.server.webflux.routes[16].filters[0]=AuthenticationFilter

# [17] Delivery Acceptance Service - accept offer action
spring.cloud.gateway.server.webflux.routes[17].id=delivery-acceptance-actions
spring.cloud.gateway.server.webflux.routes[17].uri=lb://delivery-acceptance-service
spring.cloud.gateway.server.webflux.routes[17].predicates[0]=Path=/api/delivery/offers/**
spring.cloud.gateway.server.webflux.routes[17].filters[0]=AuthenticationFilter

# [18] Order Fulfillment Service - restaurant and driver lifecycle transitions
spring.cloud.gateway.server.webflux.routes[18].id=order-fulfillment-service
spring.cloud.gateway.server.webflux.routes[18].uri=lb://order-fulfillment-service
spring.cloud.gateway.server.webflux.routes[18].predicates[0]=Path=/api/fulfillment/**
spring.cloud.gateway.server.webflux.routes[18].filters[0]=AuthenticationFilter

# [19] WebSocket Manager - live driver tracking (WebSocket upgrade)
# Spring Cloud Gateway natively proxies WebSocket connections.
# The JWT is passed as ?token= query param since WS clients cannot set headers.
spring.cloud.gateway.server.webflux.routes[19].id=websocket-manager
spring.cloud.gateway.server.webflux.routes[19].uri=lb:ws://websocket-manager
spring.cloud.gateway.server.webflux.routes[19].predicates[0]=Path=/ws/track/**
spring.cloud.gateway.server.webflux.routes[19].filters[0]=AuthenticationFilter

app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

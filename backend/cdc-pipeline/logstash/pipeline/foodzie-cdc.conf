# =============================================================================
# Foodzie CDC Pipeline — Logstash
#
# Problem this solves:
#   MongoDB has two separate collections: restaurants and menu_items.
#   Elasticsearch needs ONE nested document per restaurant containing all its
#   menu items. Debezium pushes raw change events for each collection
#   independently. This pipeline joins them into the composite document shape
#   that restaurant_search_index expects.
#
# Data flow:
#   Kafka topic: dbserver1.foodzie.restaurants  ──┐
#                                                  ├─► Logstash join ──► restaurant-search-composed ──► ES
#   Kafka topic: dbserver1.foodzie.menu_items   ──┘
#
# Join strategy:
#   Logstash does not have a native stream-join. We use the aggregate filter
#   with a Redis-backed lookup to solve this:
#
#   1. When a menu_item event arrives, we store it in the [menu_items_cache]
#      aggregate keyed by restaurant_id.
#   2. When a restaurant event arrives (or after a flush timeout), we fetch
#      all cached menu items for that restaurant_id, build the nested document,
#      and emit it to the output topic.
#
#   This is an eventually-consistent join — a restaurant document is re-emitted
#   to Elasticsearch every time any of its menu items change.
# =============================================================================

input {
  # ── Source 1: Restaurant collection changes ─────────────────────────────────
  kafka {
    id                  => "kafka-restaurants"
    bootstrap_servers   => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
    topics              => ["dbserver1.foodzie.restaurants"]
    group_id            => "logstash-restaurant-cdc"
    auto_offset_reset   => "earliest"
    codec               => "json"
    decorate_events     => true
    consumer_threads    => 1
    add_field           => { "[@metadata][source_collection]" => "restaurants" }
  }

  # ── Source 2: Menu item collection changes ───────────────────────────────────
  kafka {
    id                  => "kafka-menu-items"
    bootstrap_servers   => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
    topics              => ["dbserver1.foodzie.menu_items"]
    group_id            => "logstash-menu-items-cdc"
    auto_offset_reset   => "earliest"
    codec               => "json"
    decorate_events     => true
    consumer_threads    => 1
    add_field           => { "[@metadata][source_collection]" => "menu_items" }
  }
}

filter {
  # ── Step 1: Handle soft-deletes ──────────────────────────────────────────────
  # Debezium sets __deleted = "true" for DELETE operations (rewrite mode).
  # We tag these so the ES sink can issue a delete instead of an upsert.
  if [__deleted] == "true" {
    mutate { add_tag => ["deleted"] }
  }

  # ── Step 2: Route by collection ──────────────────────────────────────────────
  if [@metadata][source_collection] == "menu_items" {
    # ── Menu item event ─────────────────────────────────────────────────────────
    # Store this item in the aggregate cache keyed by restaurant_id.
    # The aggregate will be flushed when a restaurant event arrives for the
    # same restaurant_id, or after the push_previous_map_as timeout.

    mutate {
      # Normalise field names to match the ES index mapping
      rename => {
        "_id"           => "item_id"
        "restaurant_id" => "[@metadata][restaurant_id]"
      }
    }

    # Build a clean menu item object
    ruby {
      code => '
        item = {
          "item_id"  => event.get("item_id"),
          "name"     => event.get("name"),
          "price"    => event.get("price"),
          "category" => event.get("category")
        }
        event.set("[@metadata][menu_item]", item)
        event.set("[@metadata][agg_key]", event.get("[@metadata][restaurant_id]"))
      '
    }

    aggregate {
      task_id         => "%{[@metadata][agg_key]}"
      code            => '
        map["menu_items"] ||= {}
        item = event.get("[@metadata][menu_item]")
        item_id = item["item_id"]

        if event.get("__deleted") == "true"
          map["menu_items"].delete(item_id)
        else
          map["menu_items"][item_id] = item
        end

        # Do not emit yet — wait for the restaurant event or timeout
        event.cancel
      '
      push_previous_map_as => "menu_items_cache"
      timeout             => 30
      timeout_task_id_field => "[@metadata][agg_key]"
    }

  } else if [@metadata][source_collection] == "restaurants" {
    # ── Restaurant event ────────────────────────────────────────────────────────
    # Build the composite ES document by merging the restaurant fields with
    # any cached menu items from the aggregate.

    mutate {
      rename => { "_id" => "restaurant_id" }
    }

    # Fetch cached menu items for this restaurant from the aggregate map
    aggregate {
      task_id => "%{restaurant_id}"
      code    => '
        cached_items = map["menu_items"] || {}
        event.set("menu_items", cached_items.values)
      '
      map_action => "update"
    }

    # Build the geo_point field from latitude/longitude
    ruby {
      code => '
        lat = event.get("latitude")
        lon = event.get("longitude")
        if lat && lon
          event.set("location", { "lat" => lat, "lon" => lon })
        end
      '
    }

    # Keep only the fields the ES index mapping expects
    prune {
      whitelist_names => [
        "restaurant_id", "name", "image_url", "status",
        "location", "menu_items"
      ]
    }
  }
}

output {
  # ── Emit to the composed topic — ES Sink Connector reads from here ────────────
  if "_aggregatefailure" not in [tags] and "deleted" not in [tags] {
    kafka {
      bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
      topic_id          => "restaurant-search-composed"
      # Use restaurant_id as the Kafka message key so ES sink uses it as document ID
      message_key       => "%{restaurant_id}"
      codec             => "json"
    }
  }

  # ── Hard deletes: send a tombstone (null value) to trigger ES delete ──────────
  if "deleted" in [tags] and [@metadata][source_collection] == "restaurants" {
    kafka {
      bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
      topic_id          => "restaurant-search-composed"
      message_key       => "%{restaurant_id}"
      codec             => "json"
    }
  }

  # ── Debug logging (disable in production) ────────────────────────────────────
  stdout {
    codec => rubydebug
  }
}

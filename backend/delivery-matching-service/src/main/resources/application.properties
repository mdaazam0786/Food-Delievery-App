# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=thomas.proxy.rlwy.net:19955
spring.kafka.security.protocol=SASL_SSL
spring.kafka.sasl.mechanism=PLAIN
spring.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="jRMZi68KA7QMn5o3uazd7wv3UCnjp73_";
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=delivery-matching-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

app.kafka.topics.order-events=order-events
app.kafka.topics.delivery-events=delivery-events

# ── Matching algorithm config ─────────────────────────────────────────────────
# Initial search radius in km
app.matching.initial-radius-km=3.0
# Expansion steps when no drivers found (km)
app.matching.radius-steps=3.0,5.0,8.0,10.0
# Maximum candidates to select
app.matching.max-candidates=5
# Heartbeat key prefix — must match delivery-service and location-update-service
app.matching.heartbeat-key-prefix=driver:heartbeat:
# Geo set key prefix — must match delivery-service
app.matching.geo-key-prefix=drivers:active:

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

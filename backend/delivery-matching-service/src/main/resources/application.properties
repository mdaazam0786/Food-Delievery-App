spring.application.name=delivery-matching-service
server.port=8092

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server-udp7.onrender.com/eureka/
eureka.instance.hostname=${DELIVERY_MATCHING_SERVICE_HOST:food-delievery-app-delivery-matching-service.onrender.com}
eureka.instance.secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# ── MongoDB — reads driver profiles from MongoDB collection ──
spring.data.mongodb.uri=mongodb+srv://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@${MONGODB_HOST}/?retryWrites=true&w=majority

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:tokaido.proxy.rlwy.net:48268}
spring.kafka.security.protocol=PLAINTEXT
# Force use of bootstrap servers, don't use broker advertised addresses
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.reconnect.backoff.ms=50
spring.kafka.properties.reconnect.backoff.max.ms=1000
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=delivery-matching-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

app.kafka.topics.order-events=order-events
app.kafka.topics.delivery-events=delivery-events

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:tokaido.proxy.rlwy.net:48268}

# ── Matching algorithm config ─────────────────────────────────────────────────
# Initial search radius in km
app.matching.initial-radius-km=3.0
# Expansion steps when no drivers found (km)
app.matching.radius-steps=3.0,5.0,8.0,10.0
# Maximum candidates to select
app.matching.max-candidates=5
# Heartbeat key prefix — must match delivery-service and location-update-service
app.matching.heartbeat-key-prefix=driver:heartbeat:
# Geo set key prefix — must match delivery-service
app.matching.geo-key-prefix=drivers:active:

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

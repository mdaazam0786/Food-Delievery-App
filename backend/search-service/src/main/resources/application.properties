spring.application.name=search-service
server.port=8089

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.prefer-ip-address=true

# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URI:https://elastic:lEU9wsnVgBadLZyPc32FLxqRso@eed1a966669e4041b9341063d32ddf36.us-central1.gcp.cloud.es.io:443}

# JWT — shared HMAC-SHA256 secret
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# Search defaults
app.search.home-feed-radius-km=5.0
app.search.text-search-radius-km=10.0
app.search.max-results=50
app.search.default-page-size=20

# Geo-decay scoring (function_score gauss)
# origin = user location, scale = distance at which score drops to ~60%
# offset = inner radius where score stays at 1.0 (no decay)
# decay  = score multiplier at exactly scale distance from origin
app.search.geo-decay.scale-km=2.0
app.search.geo-decay.offset-km=0.5
app.search.geo-decay.decay=0.5

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

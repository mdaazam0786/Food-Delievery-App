spring.application.name=restaurant-service
server.port=8087

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server-udp7.onrender.com/eureka/
eureka.instance.hostname=${RESTAURANT_SERVICE_HOST:food-delievery-app-restaurant-service.onrender.com}
eureka.instance.secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# MongoDB — primary store (same Atlas cluster as order/cart/notification)
spring.data.mongodb.uri=mongodb+srv://${MONGODB_USERNAME:mdaazam0786}:${MONGODB_PASSWORD:aazam%40786}@${MONGODB_HOST:cluster0.sczcxrl.mongodb.net}/foodzie?retryWrites=true&w=majority
spring.data.mongodb.auto-index-creation=true

# JWT — shared HMAC-SHA256 secret
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:cp-kafka-production-579b.up.railway.app:9092}
spring.kafka.security.protocol=PLAINTEXT
spring.kafka.consumer.group-id=restaurant-service-group
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Force use of bootstrap servers, don't use broker advertised addresses
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.reconnect.backoff.ms=50
spring.kafka.properties.reconnect.backoff.max.ms=1000

app.kafka.topics.restaurant-events=restaurant-events
app.kafka.topics.user-registered=user.registered

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:cp-kafka-production-579b.up.railway.app:9092}
spring.kafka.admin.properties.client.dns.lookup=use_all_dns_ips

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

# ── Cloudinary (always override via env vars in production) ──────────────────

spring.application.name=notification-service
server.port=8085

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server-udp7.onrender.com/eureka/
eureka.instance.hostname=${NOTIFICATION_SERVICE_HOST:food-delievery-app-notification-service.onrender.com}
eureka.instance.secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# MongoDB
spring.data.mongodb.uri=mongodb+srv://mdaazam0786:aazam%40786@cluster0.sczcxrl.mongodb.net/foodzie
spring.data.mongodb.auto-index-creation=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:cp-kafka-production-579b.up.railway.app:9092}
spring.kafka.security.protocol=PLAINTEXT
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
# Force use of bootstrap servers, don't use broker advertised addresses
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.reconnect.backoff.ms=50
spring.kafka.properties.reconnect.backoff.max.ms=1000

app.kafka.topics.order-events=order-events
app.kafka.topics.payment-events=payment-events

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:cp-kafka-production-579b.up.railway.app:9092}

# Email (Gmail App Password for dev — replace with SES/SendGrid in prod)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:your@gmail.com}

# Firebase — path to your serviceAccountKey.json (downloaded from Firebase Console)
app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

logging.level.com.foodzie=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

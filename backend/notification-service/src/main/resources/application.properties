spring.application.name=notification-service
server.port=8085

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# MongoDB
spring.data.mongodb.uri=mongodb+srv://mdaazam0786:aazam%40786@cluster0.sczcxrl.mongodb.net/foodzie
spring.data.mongodb.auto-index-creation=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest

app.kafka.topics.order-events=order-events
app.kafka.topics.payment-events=payment-events

# Email (Gmail App Password for dev — replace with SES/SendGrid in prod)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:your@gmail.com}

# Firebase — path to your serviceAccountKey.json (downloaded from Firebase Console)
app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

logging.level.com.foodzie=DEBUG

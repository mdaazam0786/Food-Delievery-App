spring.application.name=order-service
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.hostname=${ORDER_SERVICE_HOST:food-delievery-app-order-service.onrender.com}
eureka.instance.secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# MongoDB
spring.data.mongodb.uri=mongodb+srv://mdaazam0786:aazam%40786@cluster0.sczcxrl.mongodb.net/foodzie
spring.data.mongodb.auto-index-creation=true

# JWT — same shared HMAC-SHA256 secret as auth-service and user-service
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# Kafka
spring.kafka.bootstrap-servers=cp-kafka.railway.internal:9092
spring.kafka.security.protocol=PLAINTEXT
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Force use of bootstrap servers, don't use broker advertised addresses
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.reconnect.backoff.ms=50
spring.kafka.properties.reconnect.backoff.max.ms=1000

# Consumer — order-service listens for PaymentCompletedEvent from payment-service
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

app.kafka.topics.order-events=order-events
app.kafka.topics.payment-events=payment-events
app.kafka.topics.delivery-events=delivery-events

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=cp-kafka.railway.internal:9092
spring.kafka.admin.properties.client.dns.lookup=use_all_dns_ips

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.application.name=restaurant-acceptance-service
server.port=8088

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.hostname=${RESTAURANT_ACCEPTANCE_SERVICE_HOST:food-delievery-app-restaurant-acceptance-service.onrender.com}
eureka.instance.non-secure-port=443
eureka.instance.non-secure-port-enabled=true
eureka.instance.secure-port-enabled=false

# Redis — pending order cache with TTL-based auto-expiry
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# JWT — shared HMAC-SHA256 secret
app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# Kafka
spring.kafka.bootstrap-servers=thomas.proxy.rlwy.net:19955
spring.kafka.security.protocol=SASL_SSL
spring.kafka.sasl.mechanism=PLAIN
spring.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="jRMZi68KA7QMn5o3uazd7wv3UCnjp73_";

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.group-id=restaurant-acceptance-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

app.kafka.topics.order-events=order-events

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=thomas.proxy.rlwy.net:19955

# Pending order TTL in seconds (5 minutes — after this Redis auto-expires the key)
app.pending-order.ttl-seconds=300

# SSE keep-alive timeout in milliseconds (10 minutes — tablet reconnects if idle)
app.sse.timeout-ms=600000

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

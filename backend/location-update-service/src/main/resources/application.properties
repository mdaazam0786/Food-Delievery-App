spring.application.name=location-update-service
server.port=8091

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.prefer-ip-address=true

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# ── Kafka Consumer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=thomas.proxy.rlwy.net:19955
spring.kafka.security.protocol=SASL_SSL
spring.kafka.sasl.mechanism=PLAIN
spring.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="jRMZi68KA7QMn5o3uazd7wv3UCnjp73_";

# Consumer group — one group per service so each service gets every message
spring.kafka.consumer.group-id=location-update-service-group
spring.kafka.consumer.auto-offset-reset=latest

# Read raw bytes — we deserialize manually for maximum control
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ── Micro-batch tuning ────────────────────────────────────────────────────────
# How long the consumer waits to accumulate a batch before flushing to Redis
app.location.batch-window-ms=500
# Maximum pings per batch (safety cap — flush early if this is hit)
app.location.max-batch-size=500
# Heartbeat TTL in seconds — must match delivery-service setting
app.location.heartbeat-ttl-seconds=15

# ── Kafka topic ───────────────────────────────────────────────────────────────
app.kafka.topics.location-pings=driver-location-pings

# Expose health endpoint only — this service has no REST API
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.foodzie=DEBUG

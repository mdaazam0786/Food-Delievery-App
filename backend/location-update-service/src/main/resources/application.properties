spring.application.name=location-update-service
server.port=8091

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:redis.railway.internal}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:SrznPGrBgkRgTfhyLVl0uFVgTAkTk}

# ── Kafka Consumer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Consumer group — one group per service so each service gets every message
spring.kafka.consumer.group-id=location-update-service-group
spring.kafka.consumer.auto-offset-reset=latest

# Read raw bytes — we deserialize manually for maximum control
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ── Micro-batch tuning ────────────────────────────────────────────────────────
# How long the consumer waits to accumulate a batch before flushing to Redis
app.location.batch-window-ms=500
# Maximum pings per batch (safety cap — flush early if this is hit)
app.location.max-batch-size=500
# Heartbeat TTL in seconds — must match delivery-service setting
app.location.heartbeat-ttl-seconds=15

# ── Kafka topic ───────────────────────────────────────────────────────────────
app.kafka.topics.location-pings=driver-location-pings

# Expose health endpoint only — this service has no REST API
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

logging.level.com.foodzie=DEBUG

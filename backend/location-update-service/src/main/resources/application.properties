spring.application.name=location-update-service
server.port=8091

# Eureka
eureka.client.service-url.defaultZone=https://food-delievery-app-eureka-server.onrender.com/eureka/
eureka.instance.hostname=${LOCATION_UPDATE_SERVICE_HOST:food-delievery-app-location-update-service.onrender.com}
eureka.instance.secure-port=443
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

# ── Kafka Consumer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}
spring.kafka.security.protocol=SASL_PLAINTEXT
spring.kafka.sasl.mechanism=PLAIN
spring.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="IDFLF22yXTBRd4x9b84_FlN4d-OKtuhu";

# Consumer group — one group per service so each service gets every message
spring.kafka.consumer.group-id=location-update-service-group
spring.kafka.consumer.auto-offset-reset=latest

# Read raw bytes — we deserialize manually for maximum control
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka topic
app.kafka.topics.location-pings=driver-location-pings

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=thomas.proxy.rlwy.net:19955

# Expose health endpoint only — this service has no REST API
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.foodzie=DEBUG

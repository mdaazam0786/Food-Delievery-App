spring.application.name=auth-service
server.port=8082

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/foodzie
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=ZmVlZGllLXVzZXItc2VydmljZS1zZWNyZXQta2V5LTI1Ni1iaXRzLWxvbmch
app.jwt.access-token-expiration-ms=604800000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.issuer=foodzie-auth-service

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:464819426022-5b51s4qeg9ukikd7mheeid1h2vv6vus7.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# OAuth callback must match the URL registered in Google/GitHub developer consoles.
# Traffic flows: browser (3001) → Vite proxy → API Gateway (8080) → auth-service.
spring.security.oauth2.client.registration.google.redirect-uri=${app.oauth.redirect-base:http://localhost:3001}/oauth2/callback/{registrationId}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:Ov23liK5WGnfqHHPoaFw}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:c00a3a291b3767d8c6222ff12b3971bccc7a5941}
spring.security.oau th2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=${app.oauth.redirect-base:http://localhost:3001}/oauth2/callback/{registrationId}

# Where OAuth success/failure handlers redirect the browser after login
app.frontend.url=http://localhost:3001
# OAuth callback URL — must match EXACTLY what is registered in Google/GitHub consoles.
# Browser flow: localhost:3001 → Vite proxy → gateway:8080 → auth-service.
app.oauth.redirect-base=http://localhost:3001

# Trust X-Forwarded-* headers set by the API Gateway so {baseUrl} resolves correctly
server.forward-headers-strategy=framework

# Session cookie — keep OAuth state stable through localhost proxy hops
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/

app.mfa.totp-issuer=Foodzie
app.mfa.otp-expiry-minutes=5

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topics.user-registered=user.registered

app.audit.enabled=true

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

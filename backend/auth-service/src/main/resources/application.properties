# Where OAuth success/failure handlers redirect the browser after login
app.frontend.url=https://food-delievery-app-b6b3.vercel.app
# OAuth callback URL — must match EXACTLY what is registered in Google/GitHub consoles.
# Browser flow: localhost:3001 → API Gateway → auth-service.
app.oauth.redirect-base=https://food-delievery-app-b6b3.vercel.app

# Trust X-Forwarded-* headers set by the API Gateway so {baseUrl} resolves correctly
server.forward-headers-strategy=framework

# Session cookie — keep OAuth state stable through localhost proxy hops
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.path=/

app.mfa.totp-issuer=Foodzie
app.mfa.otp-expiry-minutes=5

app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:4200,https://food-delievery-app-b6b3.vercel.app

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:tokaido.proxy.rlwy.net:48268}
spring.kafka.security.protocol=PLAINTEXT
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Force use of bootstrap servers, don't use broker advertised addresses
spring.kafka.properties.client.dns.lookup=use_all_dns_ips
spring.kafka.properties.reconnect.backoff.ms=50
spring.kafka.properties.reconnect.backoff.max.ms=1000

app.kafka.topics.user-registered=user.registered

# Kafka Auto-create Topics
spring.kafka.admin.properties.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:tokaido.proxy.rlwy.net:48268}
spring.kafka.admin.properties.client.dns.lookup=use_all_dns_ips

app.audit.enabled=true

logging.level.com.foodzie=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
